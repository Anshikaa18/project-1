<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login page</title>
    <link rel = "stylesheet" href="login.css">
    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>
<body>
    <div id = "container">
        <!--left side-->
        <div class = "left">
            <img src="side_logo.png" alt = "login">
        </div>
        <div class ="right">
            <h1> Member Login </h1>
            <form action="#" method="post">
                <div class="input-box">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="email" name="email" placeholder="Email" required>
                </div>
                <div class="input-box">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="password" maxlength="8" name="Password" placeholder="Enter password" required>
                </div>
                <button>
                    <input type="submit" value="LOGIN">
                </button>
                <a href="#" class="forgot">
                Forgot Password?
               </a>
            </form>
        </div>
    </div> 
</body>
</html>
